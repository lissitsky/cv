<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — Liliana Reis</title>
<meta name="description" content="Selected work in graphic design, motion graphics and UI/UX by Liliana Reis.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <nav class="nav container">
    <a href="index.html" class="nav-logo">LILIANA REIS</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="work.html" aria-current="page">Work</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>
</header>

<main>
  <div class="section-heading container">
    <h2>Work</h2>
  </div>

  <div class="grid" id="work-grid"></div>
</main>

<footer class="site-footer">
  <span>© <span id="year"></span> Liliana Reis</span>
  <a href="contact.html">Contact</a>
</footer>

<script src="js/projects-data.js"></script>
<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const grid = document.getElementById('work-grid');
  grid.innerHTML = projects.map(p => `
    <a class="card" href="project.html?id=${p.id}">
      <div class="thumb"><img src="${p.coverImage}" alt="${p.coverAlt}" loading="lazy"></div>
      <div class="meta"><span>${p.category}</span><span>${p.year}</span></div>
      <h3>${p.title}</h3>
    </a>
  `).join('');
</script>
</body>
</html>
